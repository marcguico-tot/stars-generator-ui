<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send to Huzzah</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #12142a; --bg-soft: #171a35; --panel: #1c2044; --line: #323a6e;
    --gold: #e8b04b; --gold-soft: #f3cd82; --text: #f1eee6; --muted: #9498b8;
    --mono: 'IBM Plex Mono', monospace; --serif: 'Fraunces', serif; --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background: radial-gradient(ellipse at 20% -10%, #23285a 0%, var(--bg) 45%) fixed;
    color: var(--text); font-family: var(--sans); padding: 60px 20px 80px;
  }
  .wrap{max-width: 640px; margin: 0 auto;}
  .eyebrow{ font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; color: var(--gold-soft); text-transform: uppercase; margin: 0 0 10px; }
  h1{ font-family: var(--serif); font-weight: 500; font-size: 32px; margin: 0 0 10px; }
  .sub{ color: var(--muted); font-size: 15px; margin: 0 0 32px; }
  .card{ background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 26px; margin-bottom: 20px; }
  label{ display:block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
  textarea, input[type=text]{
    width: 100%; background: var(--bg-soft); border: 1px solid var(--line); color: var(--text);
    border-radius: 9px; padding: 12px 14px; font-family: var(--sans); font-size: 14.5px;
  }
  textarea{ font-family: var(--mono); min-height: 200px; line-height: 1.6; margin-bottom: 18px; }
  input[type=text]:focus, textarea:focus{ outline: 2px solid var(--gold); outline-offset: 1px; border-color: var(--gold); }
  .row{ display:flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
  .field{ flex: 1 1 200px; }
  button.primary{
    background: var(--gold); color: #221a05; border: none; font-weight: 600; font-family: var(--sans);
    font-size: 14.5px; padding: 13px 24px; border-radius: 10px; cursor: pointer;
  }
  button.primary:hover{ background: var(--gold-soft); }
  button.primary:disabled{ opacity: 0.55; cursor: default; }
  .status{ margin-top: 16px; font-size: 13.5px; padding: 12px 14px; border-radius: 9px; display:none; }
  .status.ok{ display:block; background:#16281c; border:1px solid #3f7a52; color:#a6dcb4; }
  .status.err{ display:block; background:#2b1c22; border:1px solid #d17a8f; color:#e6a6b6; }
  .hint{ color: var(--muted); font-size: 13px; margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Huzzah · Sender</p>
  <h1>Send a STAR to Huzzah</h1>
  <p class="sub">Paste a STAR generated from the Claude tool, then send it straight to Mattermost.</p>

  <div class="card">
    <label for="starText">STAR text</label>
    <textarea id="starText" placeholder="Paste your generated STAR here..."></textarea>

    <div class="row">
      <div class="field">
        <label for="webhookUrl">Webhook URL</label>
        <input type="text" id="webhookUrl" placeholder="https://your-mattermost.../hooks/xxxxxxxx">
      </div>
      <div class="field">
        <label for="channelOverride">Channel override (optional)</label>
        <input type="text" id="channelOverride" placeholder="huzzah">
      </div>
    </div>

    <button class="primary" id="sendBtn">Send to Huzzah →</button>
    <div class="status" id="statusBox"></div>
    <p class="hint">The webhook URL is remembered in this browser only — it's never sent anywhere except the URL you enter above.</p>
  </div>
</div>

<script>
  const webhookUrlEl = document.getElementById('webhookUrl');
  const channelOverrideEl = document.getElementById('channelOverride');
  const starTextEl = document.getElementById('starText');
  const statusBox = document.getElementById('statusBox');
  const sendBtn = document.getElementById('sendBtn');

  // Remember the webhook URL in this browser (plain localStorage — this page
  // is meant to be hosted on its own, outside Claude's artifact sandbox).
  try{
    webhookUrlEl.value = localStorage.getItem('huzzah-webhook-url') || '';
    channelOverrideEl.value = localStorage.getItem('huzzah-channel-override') || '';
  }catch(e){ /* storage unavailable, e.g. private browsing — just skip persistence */ }

  sendBtn.addEventListener('click', async () => {
    statusBox.className = 'status';
    const text = starTextEl.value.trim();
    const webhook = webhookUrlEl.value.trim();
    const channel = channelOverrideEl.value.trim();

    if(!text){
      statusBox.className = 'status err';
      statusBox.textContent = 'Paste a STAR first — nothing to send yet.';
      return;
    }
    if(!webhook){
      statusBox.className = 'status err';
      statusBox.textContent = 'Add a webhook URL first.';
      return;
    }

    try{
      localStorage.setItem('huzzah-webhook-url', webhook);
      localStorage.setItem('huzzah-channel-override', channel);
    }catch(e){ /* ignore if storage unavailable */ }

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';

    try{
      const payload = { text };
      if(channel) payload.channel = channel;
      const resp = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if(!resp.ok) throw new Error(`Server returned ${resp.status}`);
      statusBox.className = 'status ok';
      statusBox.textContent = 'Sent to Huzzah 🎉';
      starTextEl.value = '';
    }catch(err){
      statusBox.className = 'status err';
      statusBox.textContent = `Send failed: ${err.message}. If this is a CORS error (check browser console), this webhook doesn't allow direct browser calls — point the Webhook URL above at a relay (e.g. your Pipedream URL) instead.`;
    }finally{
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send to Huzzah →';
    }
  });
</script>
</body>
</html>
